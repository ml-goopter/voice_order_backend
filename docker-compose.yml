services:
  redis:
    # Redis Stack bundles the RediSearch module the menu KNN vector index needs
    # (FT.CREATE / FT.SEARCH). Plain redis:7-alpine lacks it.
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    command: ["redis-stack-server", "--appendonly", "yes"]
    volumes:
      # Mount at redis-stack-server's native data dir (its default `dir`), so the
      # menu + KNN index actually persist. Mounting elsewhere (e.g. /data) leaves
      # the real data dir on the ephemeral container layer, lost on recreate.
      - redis-data:/var/lib/redis-stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    # pgvector-enabled Postgres: holds our `item_vector` table (KNN) alongside the
    # Odoo POS tables the menu store JOINs at read time.
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: EvGOMk4jOw6HciJTZwQSPTzSmTd+ca9rTSjqO75xiPY=%
      PGDATA: /var/lib/postgresql/data/pgdata
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      # Menu backend. Password must match the db service; set it in .env if it
      # contains URL-unsafe characters that need percent-encoding.
      ODOO_DATABASE_URL: ${ODOO_DATABASE_URL:-postgres://odoo@db:5432/postgres}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  redis-data:
  odoo-db-data:

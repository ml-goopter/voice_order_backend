services:
  redis:
    # Redis Stack bundles the RediSearch module the menu KNN vector index needs
    # (FT.CREATE / FT.SEARCH). Plain redis:7-alpine lacks it.
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    command: ["redis-stack-server", "--appendonly", "yes"]
    volumes:
      # Mount at redis-stack-server's native data dir (its default `dir`), so the
      # menu + KNN index actually persist. Mounting elsewhere (e.g. /data) leaves
      # the real data dir on the ephemeral container layer, lost on recreate.
      - redis-data:/var/lib/redis-stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
